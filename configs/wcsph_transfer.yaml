# Config to test post-training transfer learning on WCSPH dataset
# Note: (initially trained on MPM WaterDrop dataset, as used in "Learning to Simulate Complex Physics with Graph Networks" (Sanchez-Gonzalez et al. 2020))

model:
  message_passing_steps: 10
  hidden_dim: 128
  num_mlp_layers: 2
  activation: 'relu'

training:
  epochs: 50
  batch_size: 2
  learning_rate: 5.0e-5 # Slightly lower for fine-tuning
  lr_decay_rate: 0.1
  lr_decay_steps: 1000000
  noise_std: 3.0e-4
  optimizer: 'adam'

data:
  history_window: 5
  connectivity_radius: 0.015
  spatial_dim: 2
  dataset_path: 'data/wcsph_transfer'
  dataset_format: 'npz'

simulation:
  type: 'fluid'
  num_trajectories: 10
  num_particles: 400
  total_time: 1.0
  dt: 0.0005 # WCSPH needs smaller dt for stability
  save_every: 5 # 0.0005 * 5 = 0.0025 to match WaterDrop dt
  integrator: 'symplectic_euler'
  gravitational_constant: 9.81
  softening_length: 0.015 # Match connectivity radius
  position_scale: 1.0
  mass_range_min: 1.0         # Ignored in fluid (auto-computed from rest_density)
  mass_range_max: 1.0
  velocity_scale: 0.0
  
  # WCSPH specific parameters
  
  rest_density: 1000.0
  stiffness: 10000.0 # Lowered slightly for stability with larger dt
  exponent: 7.0
  viscosity: 0.1

visualization:
  fps: 24