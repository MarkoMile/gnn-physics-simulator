# Default configuration from "Learning to Simulate Complex Physics with Graph Networks" (Sanchez-Gonzalez et al. 2020)
# https://arxiv.org/abs/2002.09405

model:
  message_passing_steps: 10
  hidden_dim: 128
  num_mlp_layers: 2
  activation: 'relu'

training:
  epochs: 1
  batch_size: 2
  learning_rate: 1.0e-4
  lr_decay_rate: 0.1
  lr_decay_steps: 5000000
  noise_std: 3.0e-4
  optimizer: 'adam'

data:
  history_window: 5
  connectivity_radius: 0.015
  spatial_dim: 2
  dataset_path: 'data/WaterDrop'
  dataset_format: 'tfrecord' # Options: 'npz' (native Python) or 'tfrecord' (DeepMind)


# Simulation config (for generating dataset)

simulation:
  type: 'fluid'               # Set to 'n_body' for space simulation, 'fluid' for WaterDrop
  num_trajectories: 1         # Just testing generation locally
  num_particles: 1000         # ~1000 particles per volume (maybe 1000 would be better?)
  total_time: 2.0             # 2.0s real physical time
  dt: 0.00025                   # High precision integration step (small for SPH stability)
  save_every: 40              # Sub-sample integration to yield length 200 sequences (0.01 per frame)
  integrator: 'symplectic_euler' # Crucial for SPH
  gravitational_constant: 9.8 # Real surface gravity magnitude
  softening_length: 0.08      # SPH Smoothing Length (h). Needs to encompass ~10-20 neighbors.
  position_scale: 1.0         # 1m x 1m bounds
  velocity_scale: 0.0         # Start from rest
  mass_range_min: 1.0         # Ignored in fluid (auto-computed from rest_density)
  mass_range_max: 1.0
  # WCSPH specific parameters
  rest_density: 1000.0        # Water density
  stiffness: 35000.0           # Tait's equation gas constant
  viscosity: 0.05              # Artificial damping tuning
